<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 260px; font-family: sans-serif; padding: 12px; }
    h3 { margin: 0 0 10px; }
    button { width: 100%; padding: 8px; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; }
    #start { background: #1e88e5; color: white; }
    #stop { display: none; background: #e53935; color: white; }
    #status { margin-top: 10px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h3>🎙 Tab Audio Recorder</h3>
  <button id="start">録音するタブを選択...</button>
  <button id="stop">録音停止 &amp; 保存</button>
  <div id="status"></div>
  <script src="recorder.js"></script>
</body>
</html>
